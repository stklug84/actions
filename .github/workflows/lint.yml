---
# @author:
# 	Steffen Klug <45033201+stklug84@users.noreply.github.com>
# @date:
# 	2026-06-10
# @keywords:
# 	infrastructure, linting
# @description:
# 	Lints the repository on pull requests against main:
# 	  - actionlint   : .github/workflows/* (incl. shellcheck on run: steps)
# 	  - shellcheck   : bash run: blocks inside composite action.yml files
# 	  - yamllint     : all YAML files (.yamllint.yml)
# 	  - markdownlint : all Markdown files (.markdownlint.yml)
# 	  - python-lint  : ruff (lint+format), mypy, bandit on cv/parse and
# 	                   cv/generate (each with its own pyproject.toml)
name: Lint

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint (workflows)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download actionlint
        id: get-actionlint
        env:
          ACTIONLINT_VERSION: 1.7.10
        run: |
          set -euo pipefail
          BASE="https://raw.githubusercontent.com/rhysd/actionlint"
          bash <(curl -fsSL "$BASE/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") \
            "$ACTIONLINT_VERSION"

      - name: Run actionlint
        run: |
          set -euo pipefail
          ./actionlint -color

  shellcheck-actions:
    name: shellcheck (composite actions)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Shellcheck helper script itself
        run: |
          set -euo pipefail
          shellcheck scripts/shellcheck-actions.sh

      - name: Shellcheck bash steps in composite actions
        run: |
          set -euo pipefail
          scripts/shellcheck-actions.sh

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install yamllint
        run: |
          set -euo pipefail
          pip install --user yamllint

      - name: Run yamllint
        run: |
          set -euo pipefail
          yamllint --strict .

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yml
          globs: '**/*.md'

  python-lint:
    name: python-lint (cv/parse, cv/generate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Python tooling
        run: |
          set -euo pipefail
          pip install --user \
            ruff==0.8.6 \
            mypy==1.14.1 \
            bandit==1.8.0 \
            PyYAML==6.0.2 \
            Jinja2==3.1.5 \
            types-PyYAML==6.0.12.20241230

      - name: Run ruff (lint)
        run: |
          set -euo pipefail
          (cd cv/parse && ruff check .)
          (cd cv/generate && ruff check .)

      - name: Run ruff (format check)
        run: |
          set -euo pipefail
          (cd cv/parse && ruff format --check .)
          (cd cv/generate && ruff format --check .)

      - name: Run mypy
        run: |
          set -euo pipefail
          (cd cv/parse && mypy scripts/parse.py)
          (cd cv/generate && mypy scripts/render_variants.py)

      - name: Run bandit
        run: |
          set -euo pipefail
          (cd cv/parse && bandit -r scripts -q)
          (cd cv/generate && bandit -r scripts -q)

      - name: Run cv/parse golden tests
        run: |
          set -euo pipefail
          bash cv/parse/test/run-tests.sh

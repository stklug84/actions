---
# title: Lint workflow
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-10
# keywords: [infrastructure, linting]
# comment: |
#   Lints the repository on pull requests against main:
#     - actionlint   : .github/workflows/* (incl. shellcheck on run: steps)
#     - shellcheck   : bash run: blocks inside composite action.yml files
#     - yamllint     : all YAML files (.yamllint.yml)
#     - markdownlint : all Markdown files (.markdownlint.yaml)
#     - python-lint  : ruff (lint+format), mypy, bandit on cv/parse
#                      (config: cv/parse/pyproject.toml)
# ---
name: Lint

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint (workflows)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download actionlint
        id: get-actionlint
        env:
          ACTIONLINT_VERSION: 1.7.10
        run: |
          set -euo pipefail
          BASE="https://raw.githubusercontent.com/rhysd/actionlint"
          bash <(curl -fsSL "$BASE/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") \
            "$ACTIONLINT_VERSION"

      - name: Run actionlint
        run: |
          set -euo pipefail
          ./actionlint -color

  shellcheck-actions:
    name: shellcheck (composite actions)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shellcheck helper script itself
        run: |
          set -euo pipefail
          shellcheck scripts/shellcheck-actions.sh

      - name: Shellcheck bash steps in composite actions
        run: |
          set -euo pipefail
          scripts/shellcheck-actions.sh

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yamllint
        run: |
          set -euo pipefail
          pip install --user yamllint

      - name: Run yamllint
        run: |
          set -euo pipefail
          yamllint --strict .

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yaml
          globs: '**/*.md'

  python-lint:
    name: python-lint (cv/parse)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Python tooling
        run: |
          set -euo pipefail
          pip install --user \
            ruff==0.8.6 \
            mypy==1.14.1 \
            bandit==1.8.0 \
            PyYAML==6.0.2 \
            Jinja2==3.1.5 \
            types-PyYAML==6.0.12.20241230

      - name: Run ruff (lint)
        working-directory: cv/parse
        run: |
          set -euo pipefail
          ruff check .

      - name: Run ruff (format check)
        working-directory: cv/parse
        run: |
          set -euo pipefail
          ruff format --check .

      - name: Run mypy
        working-directory: cv/parse
        run: |
          set -euo pipefail
          mypy scripts/parse.py

      - name: Run bandit
        working-directory: cv/parse
        run: |
          set -euo pipefail
          bandit -r scripts -q

      - name: Run cv/parse golden tests
        run: |
          set -euo pipefail
          bash cv/parse/test/run-tests.sh

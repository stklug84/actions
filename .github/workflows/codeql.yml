---
# title: CodeQL workflow
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-10
# keywords: [infrastructure, security]
# comment: |
#   CodeQL code scanning over a language matrix:
#     - actions : .github/workflows/* and the composite action.yml files
#                 (expression injection, excessive permissions, untrusted
#                 checkout, artifact/cache poisoning, ...).
#     - python  : the cv/parse emitter (scripts/parse.py) — taint, unsafe
#                 deserialization, path traversal, command/template
#                 injection, ...
#   Both use build-mode `none` (no compilation needed) and the
#   security-extended suite, which adds the unpinned-tag query for
#   actions. Bash code is not a CodeQL language and is covered by
#   shellcheck in the Lint workflow instead.
# ---
name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly run to pick up newly released queries.
    - cron: '30 5 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - python
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
